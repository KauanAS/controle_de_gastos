name: controle_de_gastos
description: Controle de gastos pessoais com offline first e sincronização.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navegação
  go_router: ^13.2.0

  # Armazenamento local
  hive_flutter: ^1.1.0

  # Supabase (substitui o http puro para sincronização)
  supabase_flutter: ^2.5.6

  # HTTP (mantido para outros usos futuros)
  http: ^1.2.1

  # Utilitários
  uuid: ^4.3.3
  intl: ^0.19.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
